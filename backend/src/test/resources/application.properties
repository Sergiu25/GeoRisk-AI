# Test configuration - uses H2 in-memory database
quarkus.http.test-port=0
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;MODE=PostgreSQL
quarkus.datasource.username=sa
quarkus.datasource.password=

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# JPA / Hibernate - Flyway owns the schema in tests as it does in production
quarkus.hibernate-orm.packages=ro.sergiu.georiskai.location.entity,ro.sergiu.georiskai.weather.entity,ro.sergiu.georiskai.risk.entity
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
