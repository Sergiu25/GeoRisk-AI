quarkus.application.name=GeoRisk AI Backend
quarkus.http.port=8081

# OpenAPI / Swagger
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.smallrye-openapi.info-title=GeoRisk AI API
quarkus.smallrye-openapi.info-description=Backend API for geospatial urban risk analysis
quarkus.smallrye-openapi.info-version=0.1.0

# Datasource (placeholder for later PostgreSQL setup)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=georisk
quarkus.datasource.password=georisk
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/georisk

# Development datasource (embedded, no Docker or local PostgreSQL required)
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:georisk;MODE=PostgreSQL;DB_CLOSE_DELAY=-1

# Flyway (run migrations at startup)
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# JPA / Hibernate
quarkus.hibernate-orm.packages=ro.sergiu.georiskai.location.entity,ro.sergiu.georiskai.weather.entity,ro.sergiu.georiskai.risk.entity
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
