quarkus.application.name=GeoRisk AI Backend
quarkus.http.port=8081

# OpenAPI / Swagger
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.smallrye-openapi.info-title=GeoRisk AI API
quarkus.smallrye-openapi.info-description=Backend API for geospatial urban risk analysis
quarkus.smallrye-openapi.info-version=0.1.0

# Datasource (placeholder for later PostgreSQL setup)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=georisk
quarkus.datasource.password=georisk
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/georisk

# Flyway (disabled for now so app can start before migrations exist)
quarkus.flyway.migrate-at-start=false
quarkus.flyway.locations=classpath:db/migration
