version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8081"
    environment:
      QUARKUS_DATASOURCE_USERNAME: georisk
      QUARKUS_DATASOURCE_PASSWORD: georisk
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/georisk
    depends_on:
      - postgres

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: georisk
      POSTGRES_USER: georisk
      POSTGRES_PASSWORD: georisk
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
